name: Docker Image CI - SySoftIntegra BackEnd Development

on:
  push:
    branches: 
      - "test"

jobs:
  build-and-push:
    name: Build and Push Docker Image to ECR
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - environment: sysintegra
            service: sysintegra-services

    environment: ${{ matrix.environment }}

    env:
      ECR_IMAGE_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/syssoftintegra/back-end-development:${{ matrix.environment }}-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
    
      - name: Create .env file
        run: |
          cat > .env <<EOL
          PORT="${{secrets.PORT}}"

          APP_URL="${{secrets.APP_URL}}"
          APP_PDF="${{secrets.APP_PDF}}"
          APP_CPE_SUNAT="${{secrets.APP_CPE_SUNAT}}"
          APP_APIS_PERU="${{secrets.APP_APIS_PERU}}"
          APP_EMAIL="${{secrets.APP_EMAIL}}"
          TOKEN_ACCESS="${{secrets.TOKEN_ACCESS}}"

          DB_HOST="${{secrets.DB_HOST}}"
          DB_USER="${{secrets.DB_USER}}"
          DB_PASSWORD="${{secrets.DB_PASSWORD}}"
          DB_NAME="${{secrets.DB_NAME}}"
          DB_PORT="${{secrets.DB_PORT}}"

          FIREBASE_BUCKET="${{secrets.FIREBASE_BUCKET}}"
          FIREBASE_URL_PUBLIC="${{secrets.FIREBASE_URL_PUBLIC}}"
          FIREBASE_FILE_ACCOUNT_NAME="${{secrets.FIREBASE_FILE_ACCOUNT_NAME}}"

          TZ="${{secrets.TZ}}"
          ENVIRONMENT=${{vars.ENVIRONMENT}}

          AWS_REGION_S3=${{ secrets.AWS_REGION_S3 }}
          AWS_ACCESS_KEY_ID_S3=${{ secrets.AWS_ACCESS_KEY_ID_S3 }}
          AWS_SECRET_ACCESS_KEY_S3=${{ secrets.AWS_SECRET_ACCESS_KEY_S3 }}
          PDF_BUCKET=${{ secrets.PDF_BUCKET }}

          AMQP_PROTOCOL=${{ secrets.AMQP_PROTOCOL }}
          AMQP_HOSTNAME=${{ secrets.AMQP_HOSTNAME }}
          AMQP_PORT=${{ secrets.AMQP_PORT }}
          AMQP_USERNAME=${{ secrets.AMQP_USERNAME }}
          AMQP_PASSWORD=${{ secrets.AMQP_PASSWORD }}
          AMQP_VHOST=${{ secrets.AMQP_VHOST }}
          EOL

      - name: Build Docker image
        run: docker compose -f docker-compose.build.yml build ${{ matrix.service }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Tag back-end image
        run: docker tag ${{ matrix.environment }}-backend $ECR_IMAGE_URI

      - name: Push back-end image to ECR
        run: docker push $ECR_IMAGE_URI

  deploy-to-runs-on:
    name: Deploy to Production Server
    runs-on: self-hosted
    needs: build-and-push

    strategy:
      matrix:
        include:
          - environment: sysintegra
            service: sysintegra-services

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      CONTAINER_NAME: ${{ matrix.environment }}-backend
      IMAGE_NAME: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/syssoftintegra/back-end-development:${{ matrix.environment }}-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1 
      
      - name: Download image from Amazon ECR
        run: docker pull $IMAGE_NAME

      - name: Create and run container
        run: docker compose -f docker-compose.prod.yml up ${{ matrix.service }} -d
      
      - name: Clean up local Docker images
        run: docker image prune -af || true

  clean-ecr-images:
    name: Clear up old images in ECR
    runs-on: ubuntu-latest
    needs: deploy-to-runs-on

    strategy:
      matrix:
        include:
          - environment: sysintegra
            service: sysintegra-services

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Delete old images from ECR
        run: |
          REPO="syssoftintegra/back-end-development"
          ENV="${{ matrix.environment }}"
          TAG="${ENV}-latest"

          aws ecr list-images \
          --repository-name "$REPO" \
          --query "imageIds[?type(imageTag)==null || imageTag!='${TAG}']" \
          --output json > images.json

          COUNT=$(jq length images.json)

          if [ "$COUNT" -gt 0 ]; then
            echo "🗑️ Cleaning up $COUNT old images from $REPO..."
            
            aws ecr batch-delete-image \
              --repository-name "$REPO" \
              --image-ids file://images.json
          else
            echo "✅ There are no old images to delete from $REPO."
          fi